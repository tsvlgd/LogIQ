<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LogIQ • Prompt-friendly Log Classification</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Main Styles -->
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>

    <!-- Navigation -->
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-left">
                <div class="logo">Log<span class="logo-accent">IQ</span></div>
            </div>

            <div class="nav-right">
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                    <span class="toggle-icon">🌙</span>
                </button>
                <a href="https://github.com/tsvlgd/LogIq" target="_blank" class="github-link">
                    GitHub
                </a>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <main class="main-container">
        <section class="hero">
            <div class="hero-content">
                <h1>Turn Raw Logs into <span class="highlight-accent">Insight</span></h1>
                <p>
                    Paste raw logs and instantly classify them using
                    intelligent routing and LLM fallback.
                </p>
            </div>
        </section>

        <!-- Main Card -->
        <section class="app-card">
            <div class="input-section">
                <textarea
                    id="logs"
                    placeholder="Paste your logs here...

2024-06-01 12:00:00 - User logged in
2024-06-01 12:05:00 - Disk full"
                ></textarea>
            </div>

            <div class="action-row">
                <button
                    id="classifyBtn"
                    class="btn btn-primary"
                    onclick="classifyLogs()"
                >
                    Classify Logs
                </button>

                <button
                    id="clearBtn"
                    class="btn btn-secondary"
                    onclick="clearAll()"
                >
                    Clear
                </button>
            </div>

            <!-- Results -->
            <div id="results" class="results-container"></div>

            <!-- Error Message -->
            <div id="error-message" class="error-message"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>LogIQ • Intelligent Log Classification</p>
            <p class="footer-credits">FastAPI · LLM Routing · Open Source</p>
        </div>
    </footer>

    <!-- Main JS -->
    <script src="/static/index.js"></script>
</body>
</html>
